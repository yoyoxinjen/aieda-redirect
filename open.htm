<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AIEDA 跳轉 (HREF 版)</title>
    <style>
        body { font-family: monospace; line-height: 1.6; padding: 20px; background-color: #f9f9f9; }
        .card { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 4px; }
        .url-text { color: #666; font-size: 12px; word-break: break-all; }
        .btn { margin-top: 15px; padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; }
        #timer { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h3>AIEDA 系統導向中</h3>
        <div>案件 ID：<b id="caseId">讀取中...</b></div>
        <div class="url-text">目標網址：<span id="fullUrl">---</span></div>
        <hr>
        <p>系統將於 <span id="timer">10</span> 秒後自動嘗試關閉此頁面。</p>
        <button class="btn" onclick="triggerRedirect()">手動強制跳轉</button>
    </div>

    <script>
        // 1. 基本設定
        const baseUrl = "aieda://funcId=20221004-3e26b4f3-de7b-4e47-9415-f4de71bc945b&isSystem=true&fab=FAB12&idsCaseId=";
        const urlParams = new URLSearchParams(window.location.search);
        const idsCaseId = urlParams.get('ids_case_id');
        const new_open_Url = idsCaseId ? (baseUrl + idsCaseId) : null;

        // 執行跳轉的函式
        function triggerRedirect() {
            if (new_open_Url) {
                // 直接修改當前視窗網址，觸發自訂協議
                window.location.href = new_open_Url;
            }
        }

        // 2. 顯示資訊並自動執行
        if (idsCaseId) {
            document.getElementById('caseId').textContent = idsCaseId;
            document.getElementById('fullUrl').textContent = new_open_Url;
            
            // 0.5 秒後自動觸發跳轉
            setTimeout(triggerRedirect, 500);
        } else {
            document.getElementById('caseId').textContent = "未偵測到 ids_case_id 參數";
        }

        // 3. 10 秒倒數計時與關閉
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.close();
                // 備援提示
                document.body.innerHTML = "<h3>跳轉任務已發送</h3><p>若視窗未自動關閉，請手動關閉此分頁。</p>";
            }
        }, 1000);
    </script>

</body>
</html>
