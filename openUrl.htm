<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AIEDA 跳轉頁面</title>
    <style>
        body { font-family: monospace; line-height: 1.6; padding: 20px; background-color: #fafafa; }
        .info { margin-bottom: 20px; border-left: 5px solid #0078d4; padding-left: 15px; }
        .btn { padding: 10px 20px; cursor: pointer; background-color: #0078d4; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .btn:hover { background-color: #005a9e; }
        #timer { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>

    <div class="info">
        <div>讀取到的 ids_case_id: <span id="caseId">讀取中...</span></div>
        <div>預計開啟網址: <span id="fullUrl">計算中...</span></div>
        <div style="margin-top: 10px;">
            此分頁將於 <span id="timer">10</span> 秒後自動關閉。
        </div>
    </div>

    <button id="manualBtn" class="btn">手動開啟連結</button>

    <script>
        // 1. 設定基礎參數
        const baseUrl = "aieda://funcId=20221004-3e26b4f3-de7b-4e47-9415-f4de71bc945b&isSystem=true&fab=FAB12&idsCaseId=";
        const urlParams = new URLSearchParams(window.location.search);
        const idsCaseId = urlParams.get('ids_case_id');
        const new_open_Url = idsCaseId ? (baseUrl + idsCaseId) : null;

        // 2. 顯示資訊與綁定按鈕
        if (idsCaseId) {
            document.getElementById('caseId').textContent = idsCaseId;
            document.getElementById('fullUrl').textContent = new_open_Url;
            
            document.getElementById('manualBtn').onclick = function() {
                window.open(new_open_Url, '_blank');
            };

            // 3. 自動執行開啟新分頁 (0.5秒後執行)
            setTimeout(() => {
                window.open(new_open_Url, '_blank');
            }, 500);

        } else {
            document.getElementById('caseId').textContent = "未偵測到參數 (?ids_case_id=)";
            document.getElementById('fullUrl').textContent = "無";
        }

        // 4. 倒數計時顯示 (單純為了視覺效果)
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        const countdown = setInterval(() => {
            timeLeft--;
            if (timerElement) timerElement.textContent = timeLeft;
            if (timeLeft <= 0) clearInterval(countdown);
        }, 1000);

        // 5. 10 秒後自動關閉 (10,000 毫秒)
        setTimeout(() => {
            window.close();
            // 備援方案：如果瀏覽器攔截了 window.close()
            document.body.innerHTML = "<h1>作業結束</h1><p>已達 10 秒，系統嘗試關閉視窗失敗，請手動關閉此分頁。</p>";
        }, 10000);
    </script>

</body>
</html>
