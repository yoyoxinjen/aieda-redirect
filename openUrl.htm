<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AIEDA 跳轉頁面</title>
    <style>
        body { font-family: monospace; line-height: 1.6; padding: 20px; }
        .info { margin-bottom: 20px; }
        .btn { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="info">
        <div>讀取到的 ids_case_id: <span id="caseId">讀取中...</span></div>
        <div>預計開啟網址: <span id="fullUrl">計算中...</span></div>
        <div style="color: red; margin-top: 10px;">本視窗將於 10 秒後自動嘗試關閉。</div>
    </div>

    <button id="manualBtn" class="btn">手動開啟連結</button>

    <script>
        // 1. 設定基礎參數
        const baseUrl = "aieda://funcId=20221004-3e26b4f3-de7b-4e47-9415-f4de71bc945b&isSystem=true&fab=FAB12&idsCaseId=";
        const urlParams = new URLSearchParams(window.location.search);
        const idsCaseId = urlParams.get('ids_case_id');
        const new_open_Url = idsCaseId ? (baseUrl + idsCaseId) : null;

        // 2. 顯示資訊與綁定按鈕
        if (idsCaseId) {
            document.getElementById('caseId').textContent = idsCaseId;
            document.getElementById('fullUrl').textContent = new_open_Url;
            
            // 綁定手動按鈕
            document.getElementById('manualBtn').onclick = function() {
                window.open(new_open_Url, '_blank');
            };

            // 3. 自動執行開啟新分頁
            // 注意：部分瀏覽器會攔截非使用者觸發的 window.open，若攔截請改用按鈕
            setTimeout(() => {
                window.open(new_open_Url, '_blank');
            }, 500);

        } else {
            document.getElementById('caseId').textContent = "未偵測到參數 (?ids_case_id=)";
            document.getElementById('fullUrl').textContent = "無";
        }

        // 4. 一分鐘後自動關閉 (10,000 毫秒)
        setTimeout(() => {
            console.log("正在嘗試關閉視窗...");
            window.close();
            // 如果 window.close() 因為瀏覽器安全性限制失效，提供文字提示
            document.body.innerHTML = "<h1>作業結束</h1><p>已達一分鐘，請手動關閉此分頁。</p>";
        }, 10000);
    </script>

</body>
</html>
